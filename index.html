function insertSuggestion(dateStr, slot, value) {
  var input = document.getElementById('meal-' + dateStr + '-' + slot);
  if (input) {
    input.value = value;
    setMeal(dateStr, slot, value);
    input.className = 'meal-slot-input filled';
  }
}

// Extra meal slots per day (user-added)
const EXTRA_MEALS_STORAGE = 'chore-extra-meals-v1';
var extraMealSlots = {}; // key: dateKey, value: array of slot ids like ['extra-1','extra-2']

function loadExtraMeals() {
  try { extraMealSlots = JSON.parse(localStorage.getItem(EXTRA_MEALS_STORAGE)) || {}; } catch { extraMealSlots = {}; }
}
function saveExtraMeals() { localStorage.setItem(EXTRA_MEALS_STORAGE, JSON.stringify(extraMealSlots)); cloudSaveExtraMeals(); }

function addExtraMealSlot(dateKey) {
  if (!extraMealSlots[dateKey]) extraMealSlots[dateKey] = [];
  var num = extraMealSlots[dateKey].length + 1;
  extraMealSlots[dateKey].push('extra-' + num);
  saveExtraMeals();
  render();
}

function removeExtraMealSlot(dateKey, slotId) {
  if (!extraMealSlots[dateKey]) return;
  extraMealSlots[dateKey] = extraMealSlots[dateKey].filter(function(s) { return s !== slotId; });
  // Also remove the saved meal
  var key = getMealKey(dateKey, slotId);
  delete savedMeals[key];
  saveMeals(); saveExtraMeals(); render();
}

function renderMeals() {
  var dates = getWeekDates(mealsWeekOffset);
  var todayKey = formatDateKey(new Date());

  var startStr = dates[0].toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  var endStr = dates[6].toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  var weekLabel = startStr + ' — ' + endStr;
  if (mealsWeekOffset === 0) weekLabel += ' (This Week)';
  else if (mealsWeekOffset === 1) weekLabel += ' (Next Week)';
  else if (mealsWeekOffset === -1) weekLabel += ' (Last Week)';

  var dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  var defaultSlots = [
    { key: 'breakfast', label: 'Breakfast · Nashta (ਨਾਸ਼ਤਾ)', emoji: '🌅' },
    { key: 'lunch', label: 'Lunch · Dupehar da Khana (ਦੁਪਹਿਰ ਦਾ ਖਾਣਾ)', emoji: '☀️' },
    { key: 'snack', label: 'Snack · Snack (ਸਨੈਕ)', emoji: '🍪' },
    { key: 'dinner', label: 'Dinner · Raat da Khana (ਰਾਤ ਦਾ ਖਾਣਾ)', emoji: '🌙' },
  ];

  var daysHtml = '';
  dates.forEach(function(d, i) {
    var dk = formatDateKey(d);
    var isToday = dk === todayKey;
    var dayLabel = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

    daysHtml += '<div class="meal-day-card ' + (isToday ? 'today' : '') + '">';
    daysHtml += '<div class="meal-day-header">';
    daysHtml += '<div class="meal-day-name">' + dayNames[i] + '</div>';
    daysHtml += '<div class="meal-day-date">' + dayLabel + '</div>';
    daysHtml += '</div>';

    // Default slots
    defaultSlots.forEach(function(slot) {
      var val = getMeal(dk, slot.key);
      var filled = val ? ' filled' : '';
      daysHtml += '<div class="meal-slot">';
      daysHtml += '<div class="meal-slot-label">' + slot.emoji + ' ' + slot.label + '</div>';
      daysHtml += '<input class="meal-slot-input' + filled + '" id="meal-' + dk + '-' + slot.key + '" ' +
        'value="' + (val || '').split('"').join('&quot;') + '" ' +
        'placeholder="What\'s cooking?" ' +
        'onblur="setMeal(\'' + dk + '\',\'' + slot.key + '\',this.value);this.className=\'meal-slot-input\'+(this.value?\' filled\':\'\');" ' +
        'onkeydown="if(event.key===\'Enter\')this.blur();" />';
      daysHtml += '</div>';
    });

    // Extra slots for this day
    var extras = extraMealSlots[dk] || [];
    extras.forEach(function(slotId) {
      var val = getMeal(dk, slotId);
      var filled = val ? ' filled' : '';
      daysHtml += '<div class="meal-slot" style="position:relative;">';
      daysHtml += '<div class="meal-slot-label">🍽️ Extra <button style="background:none;border:none;font-size:11px;color:var(--text3);cursor:pointer;padding:2px 4px;" onclick="if(confirm(\'Remove this meal slot?\'))removeExtraMealSlot(\'' + dk + '\',\'' + slotId + '\')">✕</button></div>';
      daysHtml += '<input class="meal-slot-input' + filled + '" id="meal-' + dk + '-' + slotId + '" ' +
        'value="' + (val || '').split('"').join('&quot;') + '" ' +
        'placeholder="Add meal…" ' +
        'onblur="setMeal(\'' + dk + '\',\'' + slotId + '\',this.value);this.className=\'meal-slot-input\'+(this.value?\' filled\':\'\');" ' +
        'onkeydown="if(event.key===\'Enter\')this.blur();" />';
      daysHtml += '</div>';
    });

    // Add meal button
    daysHtml += '<button style="width:100%;padding:8px;border-radius:10px;border:1.5px dashed #ddd;background:transparent;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;font-family:inherit;margin-top:4px;" onclick="addExtraMealSlot(\'' + dk + '\')">+ Add Meal</button>';

    daysHtml += '</div>';
  });

  // Suggestions
  var sugSlots = [
    { key: 'breakfast', label: 'Breakfast · Nashta (ਨਾਸ਼ਤਾ)', emoji: '🌅' },
    { key: 'lunch', label: 'Lunch · Dupehar da Khana (ਦੁਪਹਿਰ ਦਾ ਖਾਣਾ)', emoji: '☀️' },
    { key: 'snack', label: 'Snack · Snack (ਸਨੈਕ)', emoji: '🍪' },
    { key: 'dinner', label: 'Dinner · Raat da Khana (ਰਾਤ ਦਾ ਖਾਣਾ)', emoji: '🌙' },
  ];
  var sugHtml = '';
  sugSlots.forEach(function(slot) {
    sugHtml += '<div style="margin-bottom:14px;">';
    sugHtml += '<div style="font-size:13px;font-weight:700;color:var(--text3);margin-bottom:6px;">' + slot.emoji + ' ' + slot.label + ' Ideas</div>';
    sugHtml += '<div class="meal-sug-chips">';
    var pool = MEAL_SUGGESTIONS[slot.key] ? MEAL_SUGGESTIONS[slot.key].slice() : [];
    var count = Math.min(8, pool.length);
    var seed = seededRandom(slot.key + todayStr() + mealsWeekOffset);
    for (var j = 0; j < count; j++) {
      var idx = (seed + j * 7) % pool.length;
      var item = pool[idx];
      sugHtml += '<button class="meal-sug-chip" onclick="insertSuggestion(\'' + todayKey + '\',\'' + slot.key + '\',\'' + item.split("'").join("\\'") + '\')">' + item + '</button>';
    }
    sugHtml += '</div></div>';
  });

  return '<div class="meals-view">' +
    '<div class="meals-header">' +
      '<div class="world-section-title" style="font-size:22px;">🍛 Meal Planner · Khane di Yojana (ਖਾਣੇ ਦੀ ਯੋਜਨਾ)</div>' +
      '<div class="meals-week-nav">' +
        '<button class="meals-week-btn" onclick="mealsWeekOffset--;render();">←</button>' +
        '<div class="meals-week-label">' + weekLabel + '</div>' +
        '<button class="meals-week-btn" onclick="mealsWeekOffset++;render();">→</button>' +
        (mealsWeekOffset !== 0 ? '<button class="meals-today-btn" onclick="mealsWeekOffset=0;render();">Today</button>' : '') +
      '</div>' +
    '</div>' +
    '<div class="meals-grid">' + daysHtml + '</div>' +
    '<div class="meal-suggestions">' +
      '<div class="meal-sug-title">💡 Need ideas? · Ki Banaiye? (ਕੀ ਬਣਾਈਏ?) Tap to add to today</div>' +
      sugHtml +
    '</div>' +
  '</div>';
}

    const q = addSearch.toLowerCase().trim();
    const results = q.length > 0
      ? CITY_DB.filter(c => {
          const already = isWeather
            ? savedWeather.some(w => w.city === c.city && w.tz === c.tz)

      <div class="add-dialog" onclick="event.stopPropagation()" style="max-width:520px;max-height:85vh;overflow-y:auto;">
        <h3>⚙️ Settings · ਸੈਟਿੰਗਜ਼</h3>

        <div class="info-card">
          <div class="info-card-title">📶 Wi-Fi Password · ਵਾਈ-ਫਾਈ</div>
          <div class="info-row">
            <span class="info-label">Network</span>
            <input class="info-value" style="border:none;background:transparent;text-align:right;width:180px;outline:none;" value="${(wf.name || '').split('"').join('&quot;')}" placeholder="Your Wi-Fi name" onchange="updateWifi('name',this.value)" />
          </div>
          <div class="info-row">
            <span class="info-label">Password</span>
            <input class="info-value" style="border:none;background:transparent;text-align:right;width:180px;outline:none;" value="${(wf.password || '').split('"').join('&quot;')}" placeholder="Your password" onchange="updateWifi('password',this.value)" />
          </div>
        </div>

        <div class="info-card">
          <div class="info-card-title">🚨 Emergency Contacts · ਐਮਰਜੈਂਸੀ</div>
          ${em.map(function(c, i) {
            return '<div class="info-row">' +
              '<input style="border:none;background:transparent;font-weight:600;color:var(--text3);width:140px;outline:none;font-family:inherit;font-size:14px;" value="' + c.label.split('"').join('&quot;') + '" onchange="familyInfo.emergency[' + i + '].label=this.value;saveFamilyInfo();cloudSaveFamilyInfo();" />' +
              '<input class="info-value" style="border:none;background:transparent;text-align:right;width:160px;outline:none;" value="' + (c.value || '').split('"').join('&quot;') + '" placeholder="Phone number" onchange="updateEmergency(' + i + ',this.value)" />' +
            '</div>';
          }).join('')}
          <button style="margin-top:8px;padding:8px 16px;border-radius:10px;border:1.5px dashed #ddd;background:transparent;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;font-family:inherit;width:100%;" onclick="addEmergencyContact()">+ Add Contact</button>
        </div>

        <div style="font-size:14px;font-weight:700;margin:16px 0 10px;">💾 Backup & Restore</div>
        <div class="backup-actions">
          <button class="backup-btn" onclick="exportData()">
            <span class="backup-btn-icon">📤</span>
            <div class="backup-btn-text">
              <div class="backup-btn-title">Export · Data Save Karo (ਡਾਟਾ ਸੇਵ ਕਰੋ)</div>
              <div class="backup-btn-desc">Download all your data as a JSON file</div>
            </div>
          </button>
          <button class="backup-btn" onclick="document.getElementById('importFile').click()">
            <span class="backup-btn-icon">📥</span>
            <div class="backup-btn-text">
              <div class="backup-btn-title">Import · Data Wapas Lyao (ਡਾਟਾ ਵਾਪਸ ਲਿਆਓ)</div>
              <div class="backup-btn-desc">Restore from a backup file</div>
            </div>
          </button>
          <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)" />
          <button class="backup-btn" onclick="if(confirm('This will delete ALL data and reset everything. Are you sure?')){localStorage.clear();location.reload();}">
            <span class="backup-btn-icon">🗑️</span>
            <div class="backup-btn-text">
              <div class="backup-btn-title">Reset · Sab Mitao (ਸਭ ਮਿਟਾਓ)</div>
              <div class="backup-btn-desc">Clear all data and start fresh</div>
            </div>
          </button>
        </div>
        <div id="backupStatus"></div>
        <div style="margin-top:16px;">
          <button class="add-cancel" onclick="closeAddDialog()">Close</button>
        </div>
      </div>`;
  }

  return '';
}

// ── EXPORT / IMPORT ──
const BACKUP_KEYS = [
  'chore-tracker-v3',
  'chore-clocks-v1',
  'chore-weather-v1',
  'chore-countdowns-v1',
  'chore-notes-v1',
  'chore-groceries-v1',
  'chore-meals-v1',
  'chore-extra-meals-v1',
  'chore-shoplist-v1',
  'chore-calendar-v1',
  'chore-info-v1',
  'chore-grid-main-floor',
  'chore-grid-top-floor',
];

function exportData() {
  var data = {};
  BACKUP_KEYS.forEach(function(key) {
    var val = localStorage.getItem(key);
    if (val) data[key] = val;
  });
  data._exported = new Date().toISOString();
  data._version = 'home-suite-home-v1';

  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'home-suite-home-backup-' + todayStr() + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  var el = document.getElementById('backupStatus');
  if (el) {
    el.innerHTML = '<div class="backup-status backup-ok">✓ Backup downloaded!</div>';
    setTimeout(function() { el.innerHTML = ''; }, 3000);
  }
}

function importData(input) {
  var file = input.files[0];
  if (!file) return;

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);

      if (!data._version) {
        showBackupError('This doesn\'t look like a Home Suite Home backup file.');
        return;
      }

      var count = 0;
      BACKUP_KEYS.forEach(function(key) {
        if (data[key]) {
          localStorage.setItem(key, data[key]);
          count++;
        }
      });

      var el = document.getElementById('backupStatus');
      if (el) {
        el.innerHTML = '<div class="backup-status backup-ok">✓ Restored ' + count + ' data sets! Reloading...</div>';
      }
      setTimeout(function() { location.reload(); }, 1500);

    } catch (err) {
      showBackupError('Failed to read backup file. Make sure it\'s a valid JSON file.');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function showBackupError(msg) {
  var el = document.getElementById('backupStatus');
  if (el) {
    el.innerHTML = '<div class="backup-status backup-err">' + msg + '</div>';
    setTimeout(function() { el.innerHTML = ''; }, 4000);
  }
}

function updateAddResults() {
  const container = document.getElementById('addResults');
  if (!container) return;
  if (addMode !== 'clock' && addMode !== 'weather') return;

  const isWeather = addMode === 'weather';
  const q = addSearch.toLowerCase().trim();
  const results = q.length > 0
    ? CITY_DB.filter(c => {
        const already = isWeather
          ? savedWeather.some(w => w.city === c.city && w.tz === c.tz)
          : savedClocks.some(w => w.city === c.city && w.tz === c.tz);
        if (already) return false;
        return c.city.toLowerCase().includes(q) || c.country.toLowerCase().includes(q);
      }).slice(0, 8)
    : [];

  container.innerHTML = results.map(c => `
    <button class="add-result-btn" onclick="${isWeather ? `addWeather(${JSON.stringify(c).replace(/"/g, '&quot;')})` : `addClock(${JSON.stringify(c).replace(/"/g, '&quot;')})`}">
      <span>${c.city}, ${c.country}</span>
      <span class="add-result-sub">${isWeather ? '' : getTimeIn(c.tz)}</span>
    </button>
  `).join('')
    + (q.length > 0 && results.length === 0 ? '<div style="padding:14px;color:var(--text3);font-size:14px;text-align:center">No matching cities found</div>' : '')
    + (q.length === 0 ? '<div style="padding:14px;color:var(--text3);font-size:14px;text-align:center">Start typing to search…</div>' : '');
}

document.addEventListener('click',e=>{
  if(e.target.id==='modal-overlay') { closeRoom(); closeAddDialog(); }
});
document.addEventListener('mouseup', handleGridUp);
document.addEventListener('touchend', handleGridUp);

loadWorld();
loadShoppingList();
loadExtraMeals();
loadCalendar();
loadFamilyInfo();
load();

// Dark mode — auto switch after 9pm, back at 6am, with manual override
var darkModeOverride = localStorage.getItem('chore-darkmode'); // 'light', 'dark', or null (auto)

function checkDarkMode() {
  var h = new Date().getHours();
  var shouldBeDark;
  if (darkModeOverride === 'dark') shouldBeDark = true;
  else if (darkModeOverride === 'light') shouldBeDark = false;
  else shouldBeDark = h >= 21 || h < 6;

  if (shouldBeDark) document.documentElement.classList.add('dark');
  else document.documentElement.classList.remove('dark');

  var btn = document.getElementById('darkToggle');
  if (btn) btn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
}

function toggleDarkMode() {
  var isDark = document.documentElement.classList.contains('dark');
  if (isDark) {
    darkModeOverride = 'light';
  } else {
    darkModeOverride = 'dark';
  }
  localStorage.setItem('chore-darkmode', darkModeOverride);
  checkDarkMode();
}

checkDarkMode();
setInterval(checkDarkMode, 60000);

render();
</script>
